<title>Contact Us</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f5f7fa;
}

nav{
background:#0f172a;
padding:20px 8%;
display:flex;
justify-content:space-between;

}

.logo{
color:white;

}

nav ul{

}

nav ul li a{

}

.hero{
height:300px;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),

background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
max-width:900px;
margin:50px auto;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

input,textarea{
width:100%;
padding:15px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
padding:15px 30px;
background:#00c853;
color:white;

border-radius:8px;
cursor:pointer;
}

.info{
margin-top:30px;

}

footer{

Send Message
